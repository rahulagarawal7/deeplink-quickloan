<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Opening App...</title>

    <script>
      const params = new URLSearchParams(window.location.search);

      const instrumentType = params.get("instrumentType");
      const instrumentId = params.get("instrumentId");

      if (!instrumentType || !instrumentId) {
        document.body.innerHTML = "<p>Invalid deep link</p>";
        throw new Error("Missing params");
      }

      const deepLink = `quickloan://instrument/${instrumentType}/${instrumentId}`;

      window.location.href = deepLink;

      setTimeout(() => {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.review2grab";
      }, 1500);
    </script>
  </head>

  <body>
    <p>Opening QuickLoan app…</p>
  </body>
</html>
